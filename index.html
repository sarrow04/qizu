<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Data Quiz</title>
<style>
  /* インスタグラムの縦長投稿(4:5)を想定したリセットと背景 */
  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background-color: #e2e8f0;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }
  
  /* スマホ画面サイズの固定コンテナ（ここでスクショを撮る） */
  .app-container {
    width: 400px;
    height: 500px;
    background: #ffffff;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    border-radius: 24px;
    padding: 30px 25px;
    box-sizing: border-box;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* 上部のステータスバー風デザイン */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid #f1f5f9;
    padding-bottom: 15px;
    margin-bottom: 20px;
  }
  
  .app-title {
    font-size: 1.1rem;
    font-weight: 800;
    color: #0f172a;
    margin: 0;
  }

  .level-badge {
    background: #2563eb;
    color: #ffffff;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.9rem;
    font-weight: bold;
  }

  /* 問題文（大きく目立たせる） */
  .question {
    font-size: 1.3rem;
    font-weight: 800;
    color: #1e293b;
    margin-bottom: 25px;
    line-height: 1.5;
  }

  /* 選択肢ボタン */
  .options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .option-btn {
    padding: 16px;
    border: 2px solid #e2e8f0;
    background: #f8fafc;
    cursor: pointer;
    border-radius: 12px;
    text-align: left;
    font-size: 1.1rem;
    font-weight: bold;
    color: #334155;
    transition: all 0.2s ease;
  }

  .option-btn:disabled {
    cursor: default;
  }

  /* 結果表示エリア */
  .result-area {
    display: none;
    flex-grow: 1;
    overflow-y: auto;
    animation: fadeIn 0.3s ease-in;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-title {
    font-size: 1.5rem;
    font-weight: 800;
    margin: 0 0 10px 0;
  }

  .correct-text { color: #16a34a; }
  .incorrect-text { color: #dc2626; }

  .answer-text {
    font-size: 1.2rem;
    font-weight: bold;
    background: #f1f5f9;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 15px;
  }

  .code-block {
    background: #1e293b;
    color: #e2e8f0;
    padding: 15px;
    border-radius: 8px;
    font-family: 'Courier New', monospace;
    font-size: 0.95rem;
    margin-bottom: 15px;
    overflow-x: auto;
  }

  .explanation {
    font-size: 0.95rem;
    line-height: 1.5;
    color: #475569;
  }

  /* 画面下部の次へボタン */
  .next-btn {
    margin-top: auto;
    padding: 16px;
    background: #0f172a;
    color: #ffffff;
    border: none;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: bold;
    width: 100%;
    display: none;
  }
</style>
</head>
<body>

<div class="app-container">
  <div class="header">
    <h1 class="app-title">Python Quiz</h1>
    <span id="level-display" class="level-badge">読込中</span>
  </div>
  
  <div id="question-area">
    <div id="question-text" class="question">データベースから問題を読み込み中...</div>
    <div id="options-container" class="options"></div>
  </div>

  <div id="result-area" class="result-area">
    <h2 id="result-title" class="result-title"></h2>
    <div id="answer-text" class="answer-text"></div>
    <div id="code-container"></div>
    <div id="explanation-text" class="explanation"></div>
  </div>

  <button id="next-btn" class="next-btn" onclick="nextQuestion()">次の問題へ</button>
</div>

<script>
  // GASのAPIエンドポイントURL（ご自身のものに置き換えてください）
  const API_URL = "https://script.google.com/macros/s/AKfycbwInQFarpndFt71e3kL7xpNvdKvvO94xbCcwt7uRFLmPpxvTRZqcZiqPMO2kw7Ub-Q0iA/exec";
  
  let quizData = [];
  let currentIndex = 0;

  async function loadQuiz() {
    try {
      const response = await fetch(API_URL);
      quizData = await response.json();
      if (quizData.length > 0) {
        showQuestion();
      }
    } catch (error) {
      document.getElementById('question-text').innerText = "通信エラーが発生しました。";
    }
  }

  function showQuestion() {
    const q = quizData[currentIndex];
    
    // 表示リセット
    document.getElementById('question-area').style.display = 'block';
    document.getElementById('result-area').style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';
    
    document.getElementById('level-display').innerText = q.level;
    document.getElementById('question-text').innerText = `Q. ${q.question}`;
    
    const optionsHtml = `
      <button class="option-btn" onclick="checkAnswer('A')">A. ${q.option_a}</button>
      <button class="option-btn" onclick="checkAnswer('B')">B. ${q.option_b}</button>
      <button class="option-btn" onclick="checkAnswer('C')">C. ${q.option_c}</button>
      <button class="option-btn" onclick="checkAnswer('D')">D. ${q.option_d}</button>
    `;
    document.getElementById('options-container').innerHTML = optionsHtml;
  }

  function checkAnswer(selected) {
    const q = quizData[currentIndex];
    
    // 画面切り替え
    document.getElementById('question-area').style.display = 'none';
    const resultArea = document.getElementById('result-area');
    resultArea.style.display = 'block';
    
    const isCorrect = (selected === q.answer);
    const titleEl = document.getElementById('result-title');
    
    if (isCorrect) {
      titleEl.innerText = "正解！";
      titleEl.className = "result-title correct-text";
    } else {
      titleEl.innerText = "不正解...";
      titleEl.className = "result-title incorrect-text";
    }
    
    document.getElementById('answer-text').innerText = `正解: ${q.answer}`;
    
    const codeContainer = document.getElementById('code-container');
    if (q.code) {
      codeContainer.innerHTML = `<div class="code-block">${q.code}</div>`;
    } else {
      codeContainer.innerHTML = "";
    }
    
    document.getElementById('explanation-text').innerText = q.explanation;
    
    const nextBtn = document.getElementById('next-btn');
    nextBtn.style.display = 'block';
    
    if (currentIndex >= quizData.length - 1) {
      nextBtn.innerText = '最初からやり直す';
      nextBtn.onclick = () => {
        currentIndex = 0;
        showQuestion();
      };
    } else {
      nextBtn.innerText = '次の問題へ';
      nextBtn.onclick = nextQuestion;
    }
  }

  function nextQuestion() {
    currentIndex++;
    showQuestion();
  }

  loadQuiz();
</script>

</body>
</html>
